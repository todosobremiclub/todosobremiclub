<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Super Admin</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
    }

    body {
      background: var(--bg);
      font-family: system-ui, sans-serif;
      margin: 0;
      color: var(--text);
      font-size: 13px;
    }

    /* HEADER */
    .topbar {
      background: #111827;
      padding: 16px 22px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h2 {
      margin: 0;
      font-size: 20px;
    }

    .topbar button {
      background: var(--danger);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    /* LAYOUT */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border-left: 5px solid var(--primary);
    }

    h3 {
      font-size: 18px;
      margin: 0 0 10px;
      color: var(--primary);
    }

    h4 {
      font-size: 13px;
      margin-top: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 4px 0 10px;
      font-size: 13px;
    }

    input[type="color"] {
      height: 32px;
      padding: 2px;
    }

    textarea {
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 900px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    button.primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: white;
      font-size: 13px;
    }

    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #f9fafb;
      color: var(--muted);
      font-weight: 600;
    }

    .subcard {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
    }

    .msg {
      display: none;
      padding: 8px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .msg.ok { display:block; background:#e7f7ea; color:#11601d; }
    .msg.err { display:block; background:#fdeaea; color:#a11a1a; }

/* ===== FIX LOGOS CLUBES ===== */
.club-logo-thumb {
  width: 46px;
  height: 46px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
}

/* =========================
   ESTADO DEL CLUB (BADGES)
========================= */
.status-badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-weight:700;
  font-size:12px;
  border:1px solid rgba(0,0,0,0.08);
  white-space:nowrap;
}

/* Verde */
.status-productivo{
  background:#dcfce7;
  color:#166534;
}

/* Azul */
.status-avanzado{
  background:#dbeafe;
  color:#1e40af;
}

/* Amarillo */
.status-pendiente{
  background:#fef9c3;
  color:#854d0e;
}

/* Rojo */
.status-sin_respuesta{
  background:#fee2e2;
  color:#991b1b;
}

  </style>
</head>

<body>

  <div class="topbar">
    <h2>Panel Super Admin</h2>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="container">

    <!-- ================= CLUBES ================= -->
    <div class="card">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Clubes</h3>
        <button id="btnOpenClubForm" class="primary">➕ Crear club</button>
      </div>

      <!-- FORM CLUB -->
      <div id="clubFormCard" class="subcard" style="display:none;">
        <h4 id="clubFormTitle">Crear club</h4>

        <form id="formClub">
          <input type="hidden" id="club_id">

          <label>Nombre *</label>
          <input id="club_name" required>

          <label>Dirección</label>
          <input id="club_address">

          <div class="form-grid">
            <div>
              <label>Ciudad</label>
              <input id="club_city">
            </div>
            <div>
              <label>Provincia</label>
              <input id="club_province">
            </div>
          </div>

          <h4>Contacto</h4>
          <div class="form-grid">
            <div>
              <label>Persona de contacto</label>
              <input id="club_contact_name">
            </div>
            <div>
              <label>Teléfono</label>
              <input id="club_contact_phone">
            </div>
          </div>

          <label>Instagram</label>
          <input id="club_instagram">

          <h4>Datos del club</h4>
          <div class="form-grid">
            <div>
              <label>Cantidad de socios</label>
              <input id="club_socios_cantidad" type="number" min="0" placeholder="Ej: 120">
            </div>
            <div>
              <label>Valor mensual</label>
              <input id="club_valor_mensual" type="number" step="0.01" min="0" placeholder="Ej: 15000">

<div>
  <label>Estado</label>
  <select id="club_estado">
    <option value="productivo">Productivo</option>
    <option value="avanzado">Avanzado</option>
    <option value="pendiente" selected>Pendiente</option>
    <option value="sin_respuesta">Sin respuesta</option>
  </select>
</div>

<div>
  <label>Socios activos</label>
  <input id="club_socios_activos" type="number" readonly placeholder="—">
</div>
            </div>
          </div>

          <h4>Identidad visual</h4>
          <div class="form-grid">
            <div>
              <label>Color primario</label>
              <input type="color" id="club_color_primary" value="#2563eb">
            </div>
            <div>
              <label>Color secundario</label>
              <input type="color" id="club_color_secondary" value="#1e40af">
            </div>
          </div>

          <label>Color acento</label>
          <input type="color" id="club_color_accent" value="#facc15">

          <h4>Imágenes</h4>
          <label>Logo</label>
          <input type="file" id="club_logo" accept="image/*">

          <label>Fondo</label>
          <input type="file" id="club_background" accept="image/*">

          <h4>Comentarios</h4>
          <textarea id="club_new_comment" rows="2"
            placeholder="Agregar comentario (queda como historial)"></textarea>
          <button type="button" id="btnAddClubComment">➕ Agregar comentario</button>

          <div id="clubCommentsList" style="margin-top:10px;"></div>

          <div style="margin-top:10px; display:flex; gap:10px;">
            <button class="primary" type="submit">Guardar club</button>
            <button type="button" id="btnCloseClubForm">Cancelar</button>
          </div>
        </form>

        <div id="clubMsg" class="msg"></div>
      </div>

      <!-- USUARIOS DEL CLUB -->
      <div id="clubUsersCard" class="subcard" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h4>Usuarios del club: <span id="clubUsersTitle"></span></h4>
          <div>
            <button id="btnClubUsersNew" class="primary">➕ Crear usuario</button>
            <button id="btnClubUsersClose">Cerrar</button>
          </div>
        </div>

        <!-- FORM USUARIO DEL CLUB -->
        <div id="clubUserFormCard" class="subcard" style="display:none;">
          <h4 id="clubUserFormTitle">Crear usuario del club</h4>

          <form id="clubUserForm">
            <input type="hidden" id="clubUser_id">

            <label>Nombre completo</label>
            <input id="clubUser_full_name">

            <label>Email *</label>
            <input id="clubUser_email" type="email" required>

            <label id="clubUser_pass_label">Contraseña *</label>
            <input id="clubUser_password" type="password">

            <label>Rol</label>
            <select id="clubUser_role">
  <option value="admin">admin</option>
  <option value="solo_lectura">solo_lectura</option>
  <option value="comunicacion">comunicacion</option>
  <option value="finanzas">finanzas</option>
  
</select>

            <div style="display:flex; gap:10px;">
              <button id="clubUserSubmitBtn" class="primary" type="submit">Guardar usuario</button>
              <button id="clubUserCancelBtn" type="button">Cancelar</button>
            </div>

            <div id="clubUserMsg" class="msg"></div>
          </form>
        </div>

        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="clubUsersTableBody"></tbody>
        </table>
      </div>

      <!-- TABLA CLUBES -->
      <table>
        <thead>
          <tr>
            <th>Logo</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Provincia</th>
<th>Estado</th>
<th>Socios activos</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clubs-table"></tbody>
      </table>

    </div>
  </div>

  <script src="/js/clubs.js"></script>
  <script src="/js/users.js"></script>

  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/admin.html';
    }
  </script>

</body>
</html>
