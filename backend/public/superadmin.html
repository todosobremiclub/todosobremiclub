<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Super Admin</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }

    body {
      background: var(--bg);
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
    }

    .topbar {
      background: #111827;
      padding: 14px 20px;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    h3 { margin: 0 0 10px; }
    h4 { margin: 20px 0 10px; color: var(--muted); }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    button.primary:hover {
      background: var(--primary-hover);
    }

    button.danger {
      background: var(--danger);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    button.danger:hover {
      background: var(--danger-hover);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 15px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      text-align: left;
    }

    .pagination {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <h2>Panel Super Admin</h2>
    <button class="danger" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="container">

    <!-- ================================
         CLUBES (con paginación)
    ================================= -->
    <div class="card">
      <h3>Clubes</h3>
      <h4>Crear / Editar club</h4>

      <form id="formClub">
        <input id="club_id" type="hidden">

        <label>Nombre del club *</label>
        <input id="club_name" required>

        <label>Dirección</label>
        <input id="club_address">

        <label>Ciudad</label>
        <input id="club_city">

        <label>Provincia</label>
        <input id="club_province">

        <h4>Contacto</h4>

        <label>Persona de contacto</label>
        <input id="club_contact_name">

        <label>Número de contacto</label>
        <input id="club_contact_phone">

        <label>Instagram</label>
        <input id="club_instagram">

        <h4>Identidad visual</h4>

        <label>Color primario</label>
        <input type="color" id="club_color_primary" value="#2563eb">

        <label>Color secundario</label>
        <input type="color" id="club_color_secondary" value="#1e40af">

        <label>Color acento</label>
        <input type="color" id="club_color_accent" value="#facc15">

        <h4>Imágenes</h4>

        <label>Logo</label>
        <input type="file" id="club_logo">

        <label>Fondo</label>
        <input type="file" id="club_background">

        <button class="primary" type="submit">Guardar club</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>Logo</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Provincia</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clubs-table"></tbody>
      </table>

      <div class="pagination">
        <button onclick="prevPageClubs()">Anterior</button>
        <button onclick="nextPageClubs()">Siguiente</button>
      </div>
    </div>

    <!-- ================================
         USUARIOS
    ================================= -->
    <div class="card">
      <h3>Usuarios</h3>
      <h4>Crear usuario</h4>

      <form id="formUser">

        <label>Nombre completo</label>
        <input id="user_full_name">

        <label>Email *</label>
        <input id="user_email" required>

        <label>Contraseña inicial *</label>
        <input type="password" id="user_password" required>

        <label>Rol</label>
        <select id="user_role">
          <option value="staff">staff</option>
          <option value="admin">admin</option>
          <option value="superadmin">superadmin</option>
        </select>

        <label>Clubes asignados</label>
        <select id="user_club_id" multiple size="6"></select>

        <button class="primary" type="submit">Crear usuario</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Roles</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>

  </div>

  <script src="/js/clubs.js"></script>
  <script src="/js/users.js"></script>

  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location = '/admin.html';
    }
  </script>

</body>
</html>
