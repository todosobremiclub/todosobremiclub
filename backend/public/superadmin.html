<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Super Admin</title>

  <style>
    /* ==== ESTILO BASE ==== */
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
    }

    body {
      background: var(--bg);
      font-family: system-ui, sans-serif;
      margin: 0;
      color: var(--text);
      font-size: 13px;
    }

    /* ==== HEADER ==== */
    .topbar {
      background: #111827;
      padding: 16px 22px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h2 {
      margin: 0;
      font-size: 20px;
    }
    .topbar button {
      background: var(--danger);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    /* ==== LAYOUT ==== */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      border-left: 5px solid var(--primary);
    }

    h3 {
      font-size: 18px;
      margin: 0 0 10px;
      color: var(--primary);
    }

    h4 {
      font-size: 13px;
      margin-top: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ==== FORM ==== */
    label {
      font-size: 12px;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin: 4px 0 10px;
      font-size: 13px;
    }

    input[type="color"] {
      height: 32px;
      padding: 2px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 900px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    button.primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    /* ==== TABLAS ==== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: white;
      font-size: 13px;
    }

    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #f9fafb;
      color: var(--muted);
      font-weight: 600;
    }

    .thumb {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* ==== SUBCARD ==== */
    .subcard {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-top: 12px;
    }

    .msg {
      display: none;
      padding: 8px;
      margin-top: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .msg.ok { display:block; background:#e7f7ea; color:#11601d; }
    .msg.err { display:block; background:#fdeaea; color:#a11a1a; }
  </style>
</head>

<body>

  <div class="topbar">
    <h2>Panel Super Admin</h2>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="container">

    <!-- ================= CLUBES ================= -->
    <div class="card">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Clubes</h3>
        <button id="btnOpenClubForm" class="primary">➕ Crear club</button>
      </div>

      <!-- FORM CLUB -->
      <div id="clubFormCard" class="subcard" style="display:none;">
        <h4 id="clubFormTitle">Crear club</h4>

        <form id="formClub">
          <input type="hidden" id="club_id">

          <label>Nombre *</label>
          <input id="club_name" required>

          <label>Dirección</label>
          <input id="club_address">

          <div class="form-grid">
            <div>
              <label>Ciudad</label>
              <input id="club_city">
            </div>
            <div>
              <label>Provincia</label>
              <input id="club_province">
            </div>
          </div>

          <h4>Contacto</h4>
          <div class="form-grid">
            <div>
              <label>Persona de contacto</label>
              <input id="club_contact_name">
            </div>
            <div>
              <label>Teléfono</label>
              <input id="club_contact_phone">
            </div>
          </div>

          <label>Instagram</label>
          <input id="club_instagram">

          <h4>Identidad visual</h4>
          <div class="form-grid">
            <div>
              <label>Color primario</label>
              <input type="color" id="club_color_primary" value="#2563eb">
            </div>
            <div>
              <label>Color secundario</label>
              <input type="color" id="club_color_secondary" value="#1e40af">
            </div>
          </div>

          <label>Color acento</label>
          <input type="color" id="club_color_accent" value="#facc15">

          <h4>Imágenes</h4>
          <label>Logo</label>
          <input type="file" id="club_logo" accept="image/*">

          <label>Fondo</label>
          <input type="file" id="club_background" accept="image/*">

          <div style="margin-top:10px; display:flex; gap:10px;">
            <button class="primary" type="submit">Guardar club</button>
            <button type="button" id="btnCloseClubForm">Cancelar</button>
          </div>
        </form>

        <div id="clubMsg" class="msg"></div>
      </div>

      <!-- USUARIOS DEL CLUB -->
      <div id="clubUsersCard" class="subcard" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h4>Usuarios del club: <span id="clubUsersTitle"></span></h4>
          <div>
            <button id="btnClubUsersNew" class="primary">➕ Crear usuario</button>
            <button id="btnClubUsersClose">Cerrar</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Rol</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="clubUsersTableBody"></tbody>
        </table>
      </div>

      <!-- TABLA CLUBES -->
      <table>
        <thead>
          <tr>
            <th>Logo</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th>Provincia</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="clubs-table"></tbody>
      </table>

    </div>
  </div>

  <script src="/js/clubs.js"></script>
  <script src="/js/users.js"></script>

  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/admin.html';
    }
  </script>

</body>
</html>
