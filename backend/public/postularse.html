<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido a tu club</title>

 <style>
  :root{
    --color-primary:#2563eb;
    --color-secondary:#1e40af;
    --color-accent:#f59e0b;
    --color-bg:#f3f4f6;
    --color-card:#ffffff;
    --color-text:#0f172a;
    --color-muted:#64748b;
    --color-border:#e5e7eb;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:system-ui, Segoe UI, Arial, sans-serif;
    background:
      linear-gradient(180deg, color-mix(in srgb, var(--color-primary) 10%, #ffffff), #f8fafc 45%, #eef2f7 100%);
    color:var(--color-text);
    padding:16px;
  }

  .card{
    max-width:760px;
    margin:0 auto;
    background:var(--color-card);
    border-radius:18px;
    padding:22px;
    border:1px solid var(--color-border);
    box-shadow:0 18px 40px rgba(15,23,42,.10);
  }

  .club-header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:10px;
    padding-bottom:14px;
    border-bottom:1px solid color-mix(in srgb, var(--color-primary) 18%, var(--color-border));
  }

  .club-logo{
    width:72px;
    height:72px;
    border-radius:16px;
    object-fit:contain;
    border:1px solid color-mix(in srgb, var(--color-primary) 26%, #d1d5db);
    background:#fff;
    padding:6px;
    display:none;
  }

  .club-title-wrap{
    min-width:0;
  }

  h2{
    margin:0;
    font-size:28px;
    line-height:1.1;
    color:var(--color-primary);
  }

  .muted{
    color:var(--color-muted);
    font-size:13px;
    margin-top:6px;
  }

  label{
    font-size:13px;
    font-weight:700;
    display:block;
    margin-top:12px;
    color:var(--color-text);
  }

  input, select{
    width:100%;
    padding:11px 12px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    font-size:14px;
    background:#fff;
  }

  input:focus, select:focus{
    outline:none;
    border-color:var(--color-primary);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--color-primary) 18%, transparent);
  }

  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .btn{
    margin-top:16px;
    width:100%;
    padding:13px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    color:#fff;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 10px 25px color-mix(in srgb, var(--color-primary) 22%, transparent);
  }

  .btn:hover{
    filter:brightness(.98);
  }

  .preview{
    margin-top:10px;
    display:flex;
    gap:10px;
    align-items:center;
  }

  .preview img{
    width:64px;
    height:64px;
    border-radius:12px;
    object-fit:cover;
    border:2px solid var(--color-primary);
  }

  .err{
    color:#b91c1c;
    font-weight:700;
    margin-top:10px;
  }

  .ok{
    color:#15803d;
    font-weight:700;
    margin-top:10px;
  }

  @media(max-width:700px){
    .row{ grid-template-columns:1fr; }
    .club-header{ align-items:flex-start; }
    h2{ font-size:24px; }
  }
</style>

</head>

<body>
  <div class="card">
  <div class="club-header">
    <img id="clubLogo" class="club-logo" alt="Logo del club"/>
    <div class="club-title-wrap">
      <h2 id="clubWelcomeTitle">Bienvenido a tu club</h2>
      <div class="muted" id="clubSubtitle">Completá tus datos.</div>
    </div>
  </div>


   
    <!-- ================= FORM ALTA ================= -->
    <!-- DNI SIEMPRE VISIBLE -->
<div class="row">
  <div>
    <label>DNI</label>
    <input id="dni" inputmode="numeric"/>
  </div>
</div>

<!-- SOLO PARA ALTA -->
<div id="formAlta">

  <div class="row">
    <div>
      <label>Nombre</label>
      <input id="nombre"/>
    </div>
    <div>
      <label>Apellido</label>
      <input id="apellido"/>
    </div>
  </div>

  <div class="row">
  <div>
    <label>Teléfono</label>
    <input id="telefono" type="tel" autocomplete="tel"/>
  </div>

  <div>
    <label>Mail</label>
    <input id="email" type="email" autocomplete="email" placeholder="ej: socio@correo.com"/>
  </div>
</div>

  <label>Actividad</label>
  <select id="actividad"></select>

  <label>Categoría</label>
  <select id="categoria"></select>

  <label>Dirección</label>
  <input id="direccion"/>

  <label>Fecha de Nacimiento</label>
  <input id="fecha_nacimiento" type="date"/>

</div>

    <!-- ================= FIN FORM ALTA ================= -->

    <!-- ================= FOTO (SIEMPRE VISIBLE) ================= -->
    <label>Foto</label>
    <input id="foto" type="file" accept="image/*" capture="user"/>

    <div class="preview" id="preview" style="display:none;">
      <img id="previewImg" alt="preview"/>
      <div class="muted" id="previewMeta"></div>
    </div>

    <button class="btn" id="enviar">Enviar postulación</button>
    <div id="msg"></div>

  </div>

  <script src="/js/postularse.js?v=3"></script>
</body>
</html>
