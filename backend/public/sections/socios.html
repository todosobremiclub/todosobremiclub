<section id="socios-section" class="section-socios">

  <!-- ✅ TOOLBAR -->
  <div class="socios-toolbar">
    <div class="socios-filters-inline">
      <input
        type="text"
        id="sociosSearch"
        placeholder="Buscar por Nombre, Apellido o DNI"
        style="min-width:220px;"
      />

      <select id="filtroActividad">
        <option value="">Todas las actividades</option>
      </select>

      <select id="filtroCategoria">
        <option value="">Todas las categorías</option>
      </select>

      <select id="filtroAnio">
        <option value="">Todos los años</option>
      </select>

      <label class="checkbox">
        <input type="checkbox" id="verInactivos" />
        Ver inactivos
      </label>

      <button id="btnBuscarSocios">Buscar</button>
    </div>

    <div class="socios-actions-inline">
      <button id="btnNuevoSocio" title="Nuevo socio">➕</button>
      <button id="btnExportSocios" title="Descargar Excel">📥</button>
    </div>
  </div>

  <!-- INFO -->
  <div class="socios-info">
    <span id="sociosActivosCount">Socios activos: 0</span>
  </div>

  <!-- TABLA -->
  <div class="table-wrapper">
    <table class="socios-table">
      <thead>
        <tr>
          <th class="sortable" data-sort="pago">Pago</th>
          <th class="sortable" data-sort="numero">N°</th>
          <th class="sortable" data-sort="dni">DNI</th>
          <th class="sortable" data-sort="nombre">Nombre</th>
          <th class="sortable" data-sort="apellido">Apellido</th>
          <th class="sortable" data-sort="actividad">Actividad</th>
          <th class="sortable" data-sort="categoria">Categoría</th>
          <th>Teléfono</th>
          <th class="sortable" data-sort="anio">Año</th>
          <th>Ingreso</th>
          <th class="sortable" data-sort="activo">Activo</th>
          <th class="sortable" data-sort="becado">Becado</th>
          <th>Foto</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="sociosTableBody"></tbody>
    </table>
  </div>

  <div id="sociosPagination" class="pagination"></div>

  <!-- ================= MODAL SOCIO ================= -->
  <div id="modalSocio" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalSocioTitle">Nuevo socio</h3>

      <div class="modal-body">
        <div class="form-grid socios-form-grid">
          <div>
            <label>N° Socio</label>
            <input type="number" id="socioNumero" placeholder="Automático si se deja vacío" />
          </div>

          <div>
            <label>DNI *</label>
            <input type="text" id="socioDni" required />
          </div>

          <div>
            <label>Nombre *</label>
            <input type="text" id="socioNombre" required />
          </div>

          <div>
            <label>Apellido *</label>
            <input type="text" id="socioApellido" required />
          </div>

          <div>
            <label>Actividad *</label>
            <select id="socioActividad" required>
              <option value="">Cargando...</option>
            </select>
            <div class="muted" style="margin-top:6px;">
              *Las actividades se administran en Configuración.
            </div>
          </div>

          <div>
            <label>Categoría *</label>
            <select id="socioCategoria" required>
              <option value="">Seleccionar...</option>
            </select>
            <div class="muted" style="margin-top:6px;">
              *Las categorías se administran en Configuración.
            </div>
          </div>

          <div>
            <label>Teléfono</label>
            <input type="text" id="socioTelefono" />
          </div>

          <div>
            <label>Dirección</label>
            <input type="text" id="socioDireccion" />
          </div>

          <div>
            <label>Fecha de nacimiento *</label>
            <input type="date" id="socioNacimiento" required />
          </div>

          <div>
            <label>Fecha de ingreso</label>
            <input type="date" id="socioIngreso" />
          </div>

          <div class="col-span-3 checks-row">
  <label class="checkbox-inline">
    <input type="checkbox" id="socioActivo" checked /> Activo
  </label>

  <label class="checkbox-inline">
    <input type="checkbox" id="socioBecado" /> Becado
  </label>
</div>
        </div>
      </div>

      <div class="modal-actions modal-footer">
        <button id="btnCancelarSocio" class="btn btn-secondary" type="button">Cancelar</button>
        <button id="btnGuardarSocio" class="btn btn-primary" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <!-- ================= MODAL CARNET ================= -->
  <div id="modalCarnet" class="modal hidden">
    <div class="modal-content" style="max-width:560px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">Carnet digital</h3>
        <button id="btnCarnetClose">✕</button>
      </div>

      <div style="display:flex; gap:12px; margin-top:12px;">
        <img
          id="carnetFoto"
          style="width:90px; height:90px; border-radius:12px; object-fit:cover;"
        />
        <div>
          <div id="carnetNombre" style="font-size:18px; font-weight:800;"></div>
          <div id="carnetDni" class="muted"></div>
          <div id="carnetCategoria" class="muted"></div>
          <div id="carnetPago" style="margin-top:8px;"></div>
        </div>
      </div>

      <div id="carnetExtra" class="muted"></div>

      <div class="modal-actions">
        <button id="btnCarnetEdit">✏️ Editar</button>
        <button id="btnCarnetOk">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- ================= ESTILOS ================= -->
  <style>

    /* -----------------------
       CARNET DIGITAL
    ----------------------- */
    #modalCarnet .modal-content {
      border: 2px solid var(--color-primary);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }
    #carnetFoto {
      border: 3px solid var(--color-primary);
    }
    #carnetNombre {
      color: var(--color-secondary);
    }
    #carnetPago {
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-weight:800;
      font-size:13px;
      background: color-mix(in srgb, var(--color-primary) 15%, white);
      color: var(--color-secondary);
    }
    #carnetExtra {
      margin-top:14px;
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:8px 14px;
    }
    #carnetExtra > div {
      padding:6px 8px;
      border-radius:8px;
      background:#f9fafb;
      border-left:3px solid var(--color-primary);
      font-size:13px;
    }
    @media (max-width:520px){
      #carnetExtra { grid-template-columns:1fr; }
    }

    /* -----------------------
       FILTROS / TOOLBAR
    ----------------------- */
    .socios-toolbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .socios-filters-inline {
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .socios-filters-inline input,
    .socios-filters-inline select,
    .socios-filters-inline button {
      height:32px;
      padding:4px 10px;
    }

    .socios-actions-inline {
      display:flex;
      gap:8px;
    }

    /* -----------------------
       TABLA
    ----------------------- */
    th.sortable {
      cursor:pointer;
      user-select:none;
    }
    th.sortable:hover { background:#eee; }

    .pagination {
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:12px;
    }

    /* -----------------------
       RESPONSIVE
    ----------------------- */
    @media (max-width:768px){

      .socios-toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .socios-filters-inline {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .socios-actions-inline {
        justify-content: flex-start;
      }

      table {
        font-size:12px;
      }

      th, td {
        padding:6px;
      }

      .modal-content {
        width: 100%;
        max-width: 92vw;
      }

      .form-grid {
        display:flex;
        flex-direction:column;
        gap:12px;
      }
    }

/* ===============================
FORMULARIO SOCIOS – HORIZONTAL
=============================== */

.socios-form-grid{
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.col-span-3{
  grid-column: span 3;
}

.checks-row{
  display: flex;
  gap: 20px;
  align-items: center;
  padding-top: 4px;
}

.checkbox-inline{
  display: flex;
  gap: 8px;
  align-items: center;
  font-weight: 600;
}

/* Modal más ancho pero más bajo */
#modalSocio .modal-content{
  max-width: 820px;
  border: 2px solid color-mix(in srgb, var(--color-primary) 35%, #d1d5db);
  border-top: 5px solid var(--color-primary);
  border-radius: 16px;
}
/* Responsive: en mobile vuelve a 1 columna */
@media (max-width: 768px){
  .socios-form-grid{
    grid-template-columns: 1fr;
  }

  .col-span-3{
    grid-column: auto;
  }

  .checks-row{
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
}

/* ===============================
IDENTIDAD VISUAL – SOCIOS
=============================== */

/* Borde de la sección socios */
#socios-section{
  border: 1px solid color-mix(in srgb, var(--color-primary) 25%, #d1d5db);
  border-left: 4px solid var(--color-primary);
  border-radius: 14px;
  padding: 14px;
  background: #ffffff;
}

/* Inputs del formulario con foco del club */
#modalSocio input:focus,
#modalSocio select:focus{
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 20%, transparent);
}

  </style>

</section>
