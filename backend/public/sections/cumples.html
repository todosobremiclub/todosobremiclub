<section class="section-cumples">
  <div class="agenda-header">
    <h2 style="margin:0;">📅 Agenda</h2>
    <button id="btnActividadAdd"
            class="btn btn-primary btn-sm"
            type="button">
      ➕ Cargar actividad
    </button>
  </div>

  <!-- ===============================
       CUMPLEAÑOS DE HOY
  =============================== -->
  <div id="cumplesHoyBanner" class="cumples-banner hidden">
    <h3 class="banner-title">📍 Hoy cumplen años:</h3>

    <div id="cumplesHoyContainer" class="cumples-hoy-container">
      <!-- Tarjetitas dinámicas -->
    </div>
  </div>

  <!-- ===============================
       CALENDARIO
  =============================== -->
  <div id="calendar" class="calendar-container"></div>

<!-- ===============================
     MODAL: CARGAR / EDITAR ACTIVIDAD
=============================== -->
<div id="modalActividad" class="modal hidden">
  <div class="modal-content" style="max-width:720px;">
    <div class="modal-header-row">
      <h3 id="actividadModalTitle">Cargar actividad</h3>
      <button id="btnActividadClose" class="btn btn-secondary">✕</button>
    </div>

    <input type="hidden" id="actividadId" />

    <form id="formActividad" class="modal-block">
      <div class="row modal-row">
        <div class="mini-block">
          <label>Fecha</label>
          <input id="actividadFecha" type="date" required />
        </div>

        <div class="mini-block">
          <label>Horario desde</label>
          <input id="actividadHoraDesde" type="time" required />
        </div>

        <div class="mini-block">
          <label>Horario hasta</label>
          <input id="actividadHoraHasta" type="time" required />
        </div>
      </div>

      <div class="modal-block">
        <label>Título</label>
        <input id="actividadTitulo"
               type="text"
               placeholder="Ej: Entrenamiento / Reunión / Partido"
               required />
      </div>

      <div class="modal-block">
        <label>Descripción</label>
        <textarea id="actividadDescripcion"
                  rows="3"
                  placeholder="Detalle de la actividad..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button"
                id="btnActividadCancel"
                class="btn btn-secondary">
          Cancelar
        </button>

        <button type="submit"
                id="btnActividadSave"
                class="btn btn-primary">
          Guardar
        </button>

        <button type="button"
                id="btnActividadDelete"
                class="btn btn-danger"
                style="display:none; margin-left:auto;">
          Eliminar
        </button>
      </div>
    </form>
  </div>
</div>

</section>

<style>

  /* --------------------------------------
     BANNER CUMPLEAÑOS DE HOY

    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.25);
  }

  .banner-title{
    margin:0 0 10px 0;
  }

  .cumples-hoy-container{
 display:flex;
 flex-direction:column;   /* ✅ uno abajo del otro */
 gap:6px;
}

  .cumple-card{
 display:flex;
 align-items:center;
 gap:8px;

 background:#fff;
 color:#111;
 padding:6px 10px;
 border-radius:8px;

 width:100%;

 box-shadow:0 1px 4px rgba(0,0,0,0.12);
 border-left:3px solid var(--color-accent);
}



/* ✅ FORZAR MINIATURA COMO EN SOCIOS */
#cumplesHoyContainer img,
.cumples-hoy-container img,
.cumple-card img{
  width:32px !important;
  height:32px !important;
  max-width:32px !important;
  max-height:32px !important;

  border-radius:50% !important;
  object-fit:cover !important;

  display:block !important;
  flex-shrink:0 !important;

  border:1px solid var(--color-primary) !important;
}

 .cumple-nombre{
 font-weight:700;
 font-size:13px;
 line-height:1.1;
}

.cumple-categoria{
 font-size:12px;
 color:#555;
}

  /* --------------------------------------
     CALENDARIO FULLCALENDAR
  -------------------------------------- */
  .calendar-container{
    width:100%;
    background:#fff;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
  }

  /* --------------------------------------
     RESPONSIVE
  -------------------------------------- */
  @media(max-width:768px){
    .cumples-hoy-container{
      flex-direction:column;
    }

  }

</style>
