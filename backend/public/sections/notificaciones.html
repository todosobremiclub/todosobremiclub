<section id="notificaciones-section" class="section-notificaciones">
  <h2 style="margin-bottom:16px;">🔔 Enviar notificación</h2>

  <div class="card">
    <div class="noti-form">
      <label for="pushTitulo">Título</label>
      <input
        type="text"
        id="pushTitulo"
        placeholder="Ej: Suspensión de actividades"
      />

      <label for="pushCuerpo">Mensaje</label>
      <textarea
        id="pushCuerpo"
        rows="3"
        placeholder="Escribí el mensaje de la notificación..."
      ></textarea>

      <button
        id="btnPushEnviar"
        class="btn btn-primary"
        style="margin-top:14px; width:100%; font-size:15px;"
      >
        📤 Guardar y enviar
      </button>

      <!-- 🔒 Destino deshabilitado temporalmente -->
<div id="notificaciones-destino" style="display:none">
  <label>Destino</label>

  <select id="notiDestinoTipo">
    <option value="todos">Todos los socios</option>
    <option value="actividad">Por Actividad</option>
    <option value="categoria">Por Categoría</option>
    <option value="anio_nac">Por Año de nacimiento</option>
    <option value="cat_anio">Categoría + Año nacimiento</option>
    <option value="act_cat">Actividad + Categoría</option>
    <option value="falta_pago">En falta de pago</option>
  </select>

  <div id="notiDestinoExtra" class="destino-extra"></div>

  <div class="muted" style="margin-top:6px;font-size:12px;">
    La notificación se enviará solo a los socios que cumplan el criterio seleccionado.
  </div>
</div>


      <div class="muted" style="margin-top:4px; font-size:12px;">
        ℹ️ Las notificaciones son solo texto. Para imágenes utilizá la sección
        <strong>Noticias</strong>.
      </div>
    </div>
  </div>

  <h3 style="margin-top:24px;">📜 Historial</h3>

  <div class="table-wrapper" style="margin-top:12px;">
    <table class="socios-table">
      <thead>
        <tr>
          <th style="width:180px;">Título</th>
          <th>Mensaje</th>
          <th style="width:140px;">Fecha</th>
          <th style="width:140px;">Enviada</th>
          <th style="width:90px;">Acciones</th>
        </tr>
      </thead>
      <tbody id="notificacionesTableBody"></tbody>
    </table>
  </div>
</section>

<style>
  .noti-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .noti-form input[type="text"],
  .noti-form textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
</style>
