<section class="section-pagos">

  <!-- =========================
       HEADER
  ========================== -->
  <div class="section-header" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <h2 style="margin:0;">Gestión de Pagos</h2>
  </div>

  <!-- =========================
       ACORDEÓN PAGOS
  ========================== -->
  <div class="accordion">

    <div class="accordion-header" data-target="pagosPanel">
      <div class="accordion-left">
        <span class="accordion-arrow">▶</span>
        <span>Pagos</span>
      </div>

      <button id="btnPagoAdd" class="btn btn-primary btn-sm" type="button">
        ➕ Registrar Pago
      </button>
    </div>

    <div id="pagosPanel" class="accordion-body hidden">

      <!-- FILTROS -->
      <div class="filters" style="margin-top:10px;">
        <input
          id="pagosSearch"
          type="text"
          placeholder="Buscar por apellido o DNI"
        />

        <select id="pagosAnioSelect"></select>

        <button id="btnRefreshPagos" class="btn btn-secondary">
          Actualizar
        </button>
      </div>

      <!-- TABLA PAGOS SOCIOS -->
      <div class="table-wrapper" style="margin-top:10px;">
        <table class="socios-table">
          <thead>
            <tr>
              <th>N° Socio</th>
              <th>Nombre</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="pagosTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- =========================
       ACORDEÓN OTROS INGRESOS
  ========================== -->
  <div class="accordion" style="margin-top:16px;">

    <div class="accordion-header" data-target="ingresosPanel">
      <div class="accordion-left">
        <span class="accordion-arrow">▶</span>
        <span>Otros ingresos</span>
      </div>

      <button
        id="btnIngresoAdd"
        class="btn btn-secondary btn-sm"
        type="button"
      >
        ➕ Registrar ingreso
      </button>
    </div>

    <div id="ingresosPanel" class="accordion-body hidden">

      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
        <div class="muted">
          Ingresos no asociados a socios (cantina, sponsors, eventos, etc.)
        </div>
        <div style="font-weight:700;">
          Total año: <span id="ingresosTotal">$ 0.00</span>
        </div>
      </div>

      <div class="table-wrapper" style="margin-top:10px;">
        <table class="socios-table">
          <thead>
            <tr>
  <th>Fecha</th>
  <th>Tipo</th>
  <th>Observación</th>
  <th>Monto</th>
  <th>Acción</th>
</tr>
          </thead>
          <tbody id="ingresosTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- =========================================================
       MODAL REGISTRAR PAGO (SOCIOS)
  ========================================================== -->
  <div id="modalPago" class="modal hidden">
    <div class="modal-content" style="max-width: 820px;">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">Registrar Pago</h3>
        <button id="btnPagoClose" class="btn btn-secondary">✕</button>
      </div>

      <div style="margin-top:12px;">
        <label>Buscar socio por Apellido o DNI</label>
        <input id="modalSocioSearch" type="text" placeholder="Ej: Pérez" />
        <div
          id="modalSocioList"
          style="
            max-height:240px;
            overflow:auto;
            border:1px solid #ddd;
            border-radius:8px;
            padding:8px;
            margin-top:6px;
          "
        ></div>
      </div>

      <div class="row" style="margin-top:12px; align-items:flex-start;">
        <div style="min-width:240px;">
          <label>Fecha de Pago</label>
          <input id="modalFechaPago" type="date" />
        </div>

        <div style="min-width:200px;">
          <label>Año</label>
          <div style="display:flex; gap:8px; align-items:center;">
            <button id="btnAnioPrev" class="btn btn-secondary">‹</button>
            <strong id="modalAnioLabel" style="font-size:18px;"></strong>
            <button id="btnAnioNext" class="btn btn-secondary">›</button>
          </div>
        </div>
      </div>

      <div style="margin-top:12px;">
        <label>Meses a pagar</label>
        <div
          id="mesesGrid"
          style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;"
        ></div>
        <div class="muted" id="montoHint" style="margin-top:8px;"></div>
      </div>

      <div class="modal-actions" style="margin-top:14px;">
        <button id="btnPagoCancel" class="btn btn-secondary">Cancelar</button>
        <button id="btnPagoSave" class="btn btn-primary">Guardar Pago</button>
      </div>
    </div>
  </div>

  <!-- =========================================================
       MODAL DETALLES PAGO SOCIO
  ========================================================== -->
  <div id="modalPagoDetalles" class="modal hidden">
    <div class="modal-content" style="max-width: 820px;">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="detTitle" style="margin:0;">Detalles de Pagos</h3>
        <button id="btnDetClose" class="btn btn-secondary">✕</button>
      </div>

      <div class="muted" id="detSub" style="margin-top:8px;"></div>

      <div class="table-wrapper" style="margin-top:12px;">
        <table class="socios-table">
          <thead>
            <tr>
              <th>Mes</th>
              <th>Monto</th>
              <th>Fecha de pago</th>
            </tr>
          </thead>
          <tbody id="detTableBody"></tbody>
        </table>
      </div>

      <div class="row" style="justify-content: space-between; margin-top: 10px;">
        <strong id="detTotal"></strong>
        <button id="btnDetOk" class="btn btn-primary">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- =========================
       ESTILOS ACORDEÓN
  ========================== -->
  <style>
    .accordion{
      border:1px solid rgba(0,0,0,0.08);
      border-radius:12px;
      overflow:hidden;
    }

    .accordion-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:#f9fafb;
      cursor:pointer;
      font-weight:800;
    }

    .accordion-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .accordion-arrow{
      font-size:12px;
      transition:transform .2s ease;
    }

    .accordion.open .accordion-arrow{
      transform:rotate(90deg);
    }

    .accordion-body{
      padding:14px;
      background:#fff;
    }

    .hidden{
      display:none;
    }

    .btn-sm{
      height:30px;
      padding:4px 10px;
      font-size:13px;
    }
  </style>

</section>
