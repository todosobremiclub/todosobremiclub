<section class="section-pagos">

  <!-- =========================
       HEADER
  ========================== -->
  <div class="section-header" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <h2 style="margin:0;">Gestión de Pagos</h2>
  </div>

  <!-- =========================
     ACORDEÓN: PAGOS
========================== -->
<div class="accordion">

  <div class="accordion-header" data-target="pagosPanel">
    <div class="accordion-left">
      <span class="accordion-arrow">▶</span>
      <span>Pagos</span>
    </div>

    <button id="btnPagoAdd" class="btn btn-primary btn-sm" type="button">
      ➕ Registrar Pago
    </button>
  </div>

  <div id="pagosPanel" class="accordion-body hidden">

    <!-- FILTROS -->
    <div class="filters filtros-pagos">
      <input id="pagosSearch" type="text" placeholder="Buscar por apellido o DNI" />
      <select id="pagosAnioSelect"></select>
      <button id="btnRefreshPagos" class="btn btn-secondary">Actualizar</button>
    </div>

    <!-- TABLA -->
    <div class="table-wrapper" style="margin-top:10px;">
      <table class="socios-table">
        <thead>
          <tr>
            <th>N° Socio</th>
            <th>Nombre</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="pagosTableBody"></tbody>
      </table>
    </div>

  </div> <!-- ✅ cierre pagosPanel -->
</div> <!-- ✅ cierre accordion Pagos -->


  <!-- =========================
       ACORDEÓN: OTROS INGRESOS
  ========================== -->
  <div class="accordion" style="margin-top:16px;">

    <div class="accordion-header" data-target="ingresosPanel">
      <div class="accordion-left">
        <span class="accordion-arrow">▶</span>
        <span>Otros ingresos</span>
      </div>

      <button id="btnIngresoAdd" class="btn btn-secondary btn-sm" type="button">
        ➕ Registrar ingreso
      </button>
    </div>

    <div id="ingresosPanel" class="accordion-body hidden">

      <div class="ingresos-top">
        <div class="muted">
          Ingresos no asociados a socios 
        </div>
        <div class="total-ingresos">
          Total año: <span id="ingresosTotal">$ 0.00</span>
        </div>
      </div>

      <div class="table-wrapper" style="margin-top:10px;">
        <table class="socios-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Observación</th>
              <th>Monto</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="ingresosTableBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- =========================================
       MODAL: REGISTRAR PAGO
  ============================================== -->
  <div id="modalPago" class="modal hidden">
    <div class="modal-content" style="max-width: 820px;">

      <div class="modal-header-row">
        <h3>Registrar Pago</h3>
        <button id="btnPagoClose" class="btn btn-secondary">✕</button>
      </div>

      <div class="modal-block">
        <label>Buscar socio por Apellido o DNI</label>
        <input id="modalSocioSearch" type="text" placeholder="Ej: Pérez" />

        <div id="modalSocioList" class="modal-socio-list"></div>
      </div>

      <div class="row modal-row">
        <div class="mini-block">
          <label>Fecha de Pago</label>
          <input id="modalFechaPago" type="date" />
        </div>

        <div class="mini-block">
          <label>Año</label>
          <div class="anio-selector">
            <button id="btnAnioPrev" class="btn btn-secondary">‹</button>
            <strong id="modalAnioLabel"></strong>
            <button id="btnAnioNext" class="btn btn-secondary">›</button>
          </div>
        </div>
      </div>

<div class="modal-block">
  <label>Cuenta</label>
  <select id="pagoCuenta" required>
    <option value="">Cargando...</option>
  </select>
</div>

      <div class="modal-block">
        <label>Meses a pagar</label>
        <div id="mesesGrid" class="meses-grid"></div>
        <div class="muted" id="montoHint"></div>
      </div>

<!-- ================================
     NUEVO: Pago parcial
================================ -->
<div class="modal-block" id="pagoParcialContainer" style="margin-top: 12px;">

  <label class="checkbox" style="display:flex; align-items:center; gap:8px;">
    <input type="checkbox" id="pagoParcialChk" />
    Pago parcial (monto fijo por mes)
  </label>

  <div class="mini-block" style="margin-top:6px;">
    <label>Monto parcial</label>
    <input
      id="pagoParcialMonto"
      type="number"
      step="0.01"
      min="0"
      placeholder="Ej: 1500"
      disabled
      style="max-width:160px;"
    />
  </div>
</div>

      <div class="modal-actions">
        <button id="btnPagoCancel" class="btn btn-secondary">Cancelar</button>
        <button id="btnPagoSave" class="btn btn-primary">Guardar Pago</button>
      </div>

    </div>
  </div>

  <!-- =========================================
       MODAL: DETALLES DEL PAGO
  ============================================== -->
  <div id="modalPagoDetalles" class="modal hidden">
    <div class="modal-content" style="max-width:820px;">

      <div class="modal-header-row">
        <h3 id="detTitle">Detalles de Pagos</h3>
        <button id="btnDetClose" class="btn btn-secondary">✕</button>
      </div>

      <div class="muted" id="detSub"></div>

      <div class="table-wrapper" style="margin-top:12px;">
        <table class="socios-table">
          <thead>
            <tr>
              <th>Mes</th>
              <th>Monto</th>
              <th>Fecha de pago</th>
            </tr>
          </thead>
          <tbody id="detTableBody"></tbody>
        </table>
      </div>

      <div class="row" style="justify-content: space-between; margin-top: 10px;">
        <strong id="detTotal"></strong>
        <button id="btnDetOk" class="btn btn-primary">Aceptar</button>
      </div>

    </div>
  </div>

  <!-- =========================================
       MODAL: REGISTRAR INGRESO
  ============================================== -->
  <div id="modalIngreso" class="modal hidden">
    <div class="modal-content" style="max-width:720px;">

      <div class="modal-header-row">
        <h3>Registrar ingreso</h3>
        <button id="btnIngresoClose" class="btn btn-secondary">✕</button>
      </div>

      <form id="formIngreso" class="modal-block">

        <div class="row modal-row">
          <div class="mini-block flex-1">
            <label>Tipo de ingreso</label>
            <select id="ingresoTipo" required>
              <option value="">Cargando...</option>
            </select>
          </div>

          <div class="mini-block">
            <label>Fecha de pago</label>
            <input id="ingresoFecha" type="date" required />
          </div>
        </div>

        <div class="row modal-row">
          <div class="mini-block">
            <label>Monto</label>
            <input id="ingresoMonto" type="number" step="0.01" min="0" required />
          </div>

<div class="mini-block flex-1">
  <label>Cuenta</label>
  <select id="ingresoCuenta" required>
    <option value="">Cargando...</option>
  </select>
</div>

          <div class="mini-block flex-1">
            <label>Observación</label>
            <input id="ingresoObs" type="text" placeholder="Ej: Venta cantina, Sponsor..." />
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="btnIngresoCancel" class="btn btn-secondary">Cancelar</button>
          <button type="submit" id="btnIngresoSave" class="btn btn-primary">Guardar ingreso</button>
        </div>

      </form>

      <div class="muted" style="margin-top:10px;">
        Este ingreso no está asociado a ningún socio.
      </div>
    </div>
  </div>

  <!-- =========================
       ESTILOS
  ========================== -->
  <style>

    /* ------------------------------------
       ACORDEÓN
    ------------------------------------ */
    .accordion{
      border:1px solid rgba(0,0,0,0.08);
      border-radius:12px;
      overflow:hidden;
    }
    .accordion-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 14px;
      background:#f9fafb;
      cursor:pointer;
      font-weight:800;
    }
    .accordion-left{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .accordion-arrow{
      font-size:12px;
      transition:transform .2s ease;
    }
    .accordion.open .accordion-arrow{
      transform:rotate(90deg);
    }
    .accordion-body{
      padding:14px;
      background:#fff;
    }
    .hidden{ display:none; }

    /* ------------------------------------
       FILTROS PAGOS
    ------------------------------------ */
    .filtros-pagos{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .filtros-pagos input,
    .filtros-pagos select,
    .filtros-pagos button{
      height:32px;
      padding:4px 10px;
    }

    /* ------------------------------------
       INGRESOS TOP
    ------------------------------------ */
    .ingresos-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .total-ingresos{
      font-weight:700;
    }

    /* ------------------------------------
       MODALES
    ------------------------------------ */
    .modal-header-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .modal-socio-list{
      max-height:240px;
      overflow:auto;
      border:1px solid #ddd;
      border-radius:8px;
      padding:8px;
      margin-top:6px;
    }

    .modal-block{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .modal-row{
      margin-top:12px;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
    }

    .mini-block{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .flex-1{ flex:1; }

    .anio-selector{
      display:flex;
      align-items:center;
      gap:8px;
    }

    /* ------------------------------------
       GRID DE MESES
    ------------------------------------ */
    .meses-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    /* ------------------------------------
       RESPONSIVE
    ------------------------------------ */
    @media(max-width:768px){

      .meses-grid{
        grid-template-columns: repeat(2, 1fr);
      }

      @media(max-width:480px){
        .meses-grid{
          grid-template-columns:1fr;
        }
      }

      .accordion-header{
        flex-direction:column;
        align-items:flex-start;
        gap:6px;
      }

      .filtros-pagos{
        flex-direction:column;
        align-items:stretch;
      }

      .ingresos-top{
        flex-direction:column;
        align-items:flex-start;
      }

      .modal-content{
        width:100%;
        max-width:94vw;
      }
    }

  </style>

</section>
