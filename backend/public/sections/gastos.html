<!-- sections/gastos.html -->
<section class="section-gastos">

  <div class="section-header gastos-header">
    <h2>Gestión de Gastos</h2>

    <button id="btnGastoAdd" class="btn btn-primary">
      + Registrar nuevo gasto
    </button>
  </div>

  <!-- FILTROS -->
  <div class="filters filtros-gastos">
    <label class="label-inline">
      Período:
      <input type="month" id="filtroPeriodo">
    </label>
    <button id="btnFiltrarGastos" class="btn btn-secondary">Ver</button>
  </div>

  <!-- CONTENEDOR DE ACORDEONES -->
  <div id="gastosAccordions"></div>

  <!-- TOTAL -->
  <div class="total-periodo">
    <span>Total período:</span>
    <strong id="totalPeriodo">$ 0,00</strong>
  </div>


  <!-- ===============================
       MODAL REGISTRAR GASTO
  ================================ -->
  <div id="modalGasto" class="modal hidden">
    <div class="modal-content" style="max-width:620px;">

      <h3 style="margin:0 0 10px 0;">Registrar Gasto</h3>

      <form id="formGasto" class="modal-form">

        <label>
          Tipo de gasto
          <select id="gastoTipo" required>
            <option value="">Cargando...</option>
          </select>
        </label>

        <label>
          Fecha del gasto
          <input type="date" id="gastoFecha" required>
        </label>

        <label>
          Quién hizo el gasto
          <select id="gastoResponsable" required>
            <option value="">Cargando...</option>
          </select>
        </label>

<label>
  Cuenta / Medio de pago
  <select id="gastoCuenta" required>
    <option value="">Cargando...</option>
  </select>
</label>

        <label>
          Monto (ARS)
          <input type="number" id="gastoMonto" min="0" step="0.01" required>
        </label>

        <label>
          Descripción
          <textarea id="gastoDescripcion" rows="2"></textarea>
        </label>

        <div class="modal-actions">
          <button type="button" id="btnGastoCancel" class="btn btn-secondary">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>

      </form>
    </div>
  </div>


  <!-- ===============================
       ESTILOS MEJORADOS
  ================================ -->
  <style>

    /* ------------------------------------
       HEADER
    ------------------------------------ */
    .gastos-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:12px;
    }

    /* ------------------------------------
       FILTROS
    ------------------------------------ */
    .filtros-gastos{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:12px;
      margin-bottom:12px;
    }

    .label-inline{
      display:flex;
      align-items:center;
      gap:6px;
      white-space:nowrap;
    }

    .filtros-gastos input,
    .filtros-gastos button{
      height:32px;
      padding:4px 10px;
    }


    /* ------------------------------------
       ACORDEONES DE GASTOS
    ------------------------------------ */
    .accordion{
      border:1px solid rgba(0,0,0,0.08);
      border-radius:12px;
      overflow:hidden;
      margin-top:12px;
      background:#fff;
    }

    .accordion-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:#f9fafb;
      cursor:pointer;
      font-weight:800;
    }

    .accordion-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .accordion-arrow{
      font-size:12px;
      transition:transform .2s ease;
    }

    .accordion.open .accordion-arrow{
      transform:rotate(90deg);
    }

    .accordion-body{
      padding:12px 14px;
    }

    .hidden{ display:none; }


    /* ------------------------------------
       TABLAS DENTRO DE ACORDEONES
    ------------------------------------ */
    .table-container{
      overflow:auto;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
    }

    .table{
      width:100%;
      border-collapse:collapse;
    }

    .table th,
    .table td{
      border-bottom:1px solid #eee;
      padding:8px;
      font-size:14px;
      white-space:nowrap;
      text-align:left;
    }

    .table th{
      background:#f7f7f7;
    }


    /* ------------------------------------
       TOTAL PERÍODO
    ------------------------------------ */
    .total-periodo{
      margin-top:16px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
      font-size:16px;
    }


    /* ------------------------------------
       MODAL
    ------------------------------------ */
    .modal-form{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:8px;
    }

    .modal-content{
      width:min(600px, 94vw);
      padding:16px;
    }

    .modal textarea{
      resize:vertical;
    }


    /* ------------------------------------
       RESPONSIVE
    ------------------------------------ */
    @media(max-width:768px){

      .gastos-header{
        flex-direction:column;
        align-items:flex-start;
      }

      .filtros-gastos{
        flex-direction:column;
        align-items:stretch;
      }

      .table th, .table td{
        padding:6px;
        font-size:12px;
      }

      .modal-content{
        width:100%;
        max-width:94vw;
      }
    }

  </style>

</section>
