<!-- sections/gastos.html -->
<section class="section-gastos">

  <div class="section-header">
    <h2>Gestión de Gastos</h2>

    <button id="btnGastoAdd" class="btn btn-primary">
      + Registrar nuevo gasto
    </button>
  </div>

  <!-- Filtros -->
  <div class="filters">
    <label>
      Período:
      <input type="month" id="filtroPeriodo">
    </label>
    <button id="btnFiltrarGastos" class="btn btn-secondary">Ver</button>
  </div>

  <!-- ✅ CONTENEDOR NUEVO: gastos agrupados por mes -->
  <!-- (reemplaza la tabla plana, el JS renderiza acá los acordeones) -->
  <div id="gastosAccordions">
    <!-- dinámico -->
  </div>

  <!-- Total -->
  <div class="total-periodo">
    <span>Total período:</span>
    <strong id="totalPeriodo">$ 0,00</strong>
  </div>

  <!-- MODAL REGISTRAR GASTO -->
  <div id="modalGasto" class="modal hidden">
    <div class="modal-content">

      <h3>Registrar Gasto</h3>

      <form id="formGasto">

        <label>
          Tipo de gasto
          <select id="gastoTipo" required>
            <option value="">Cargando...</option>
          </select>
        </label>

        <!-- ✅ Fecha completa día / mes / año -->
        <label>
          Fecha del gasto
          <input type="date" id="gastoFecha" required>
        </label>

        <label>
          Quién hizo el gasto
          <select id="gastoResponsable" required>
            <option value="">Cargando...</option>
          </select>
        </label>

        <label>
          Monto (ARS)
          <input type="number" id="gastoMonto" min="0" step="0.01" required>
        </label>

        <label>
          Descripción
          <textarea id="gastoDescripcion" rows="2"></textarea>
        </label>

        <div class="modal-actions">
          <button type="button" id="btnGastoCancel" class="btn btn-secondary">
            Cancelar
          </button>

          <button type="submit" class="btn btn-primary">
            Guardar
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- ✅ ESTILOS (solo para acordeones, no rompe nada existente) -->
  <style>
    .accordion{
      border:1px solid rgba(0,0,0,0.08);
      border-radius:12px;
      overflow:hidden;
      margin-top:12px;
      background:#fff;
    }

    .accordion-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:#f9fafb;
      cursor:pointer;
      font-weight:800;
    }

    .accordion-left{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .accordion-arrow{
      font-size:12px;
      transition:transform .2s ease;
    }

    .accordion.open .accordion-arrow{
      transform:rotate(90deg);
    }

    .accordion-body{
      padding:12px 14px;
    }

    .hidden{
      display:none;
    }

    .table-container{
      overflow:auto;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
    }

    .table{
      width:100%;
      border-collapse:collapse;
    }

    .table th,
    .table td{
      border-bottom:1px solid #eee;
      padding:8px;
      font-size:14px;
      white-space:nowrap;
      text-align:left;
    }

    .table th{
      background:#f7f7f7;
    }
  </style>

</section>
