<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel del Club</title>

  <style>
    :root {
      --color-primary: #2563eb;
      --color-secondary: #1e40af;
      --color-accent: #facc15;
    }

    /* =========================
       RESET + BASE
    ========================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    /* =========================
       LAYOUT
    ========================= */
    .layout {
      display:flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .content {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 14px 18px;
    }

    section[class^="section-"],
    section.section{
      border: 1px solid color-mix(in srgb, var(--color-primary) 22%, #d1d5db);
      border-left: 4px solid var(--color-primary);
      border-radius: 14px;
      padding: 14px;
      background: #ffffff;
      margin-bottom: 16px;
    }

    /* =========================
       BOTONES
    ========================= */
    .navbtn {
      text-align:left;
      padding:10px 12px;
      border:0;
      border-radius:10px;
      cursor:pointer;
      background: var(--color-primary);
      color:#fff;
      font-size:14px;
      white-space: nowrap;
    }
    .navbtn:hover { background: var(--color-secondary); }

    .navbtn--top {
      padding:8px 12px;
      font-size:13px;
    }

    .navbtn--logout {
      background:#ef4444;
    }
    .navbtn--logout:hover {
      background:#dc2626;
    }

    /* =========================
       HEADER
    ========================= */
    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      border: 1px solid rgba(255,255,255,0.18);
      color:#fff;
    }

    .topbar-left {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .logo {
      height: 52px;
      width: 52px;
      object-fit: contain;
      border-radius: 10px;
      border:1px solid rgba(255,255,255,0.35);
      background: #fff;
      padding: 2px;
    }

    .topbar-titles {
      display:flex;
      flex-direction:column;
      line-height:1.15;
    }
    .club-name {
      font-size:18px;
      font-weight:700;
      color:#fff;
    }
    .club-user {
      font-size:13px;
      color:rgba(255,255,255,0.9);
    }

    .topbar-right {
      display:flex;
      align-items:center;
      gap:8px;
    }

    .club-select {
      padding:4px 6px;
      font-size:12px;
      border-radius:6px;
      border:1px solid #ddd;
    }

    .badge {
      display:inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--color-accent);
      font-size: 12px;
      color:#111827;
      font-weight:700;
    }

    /* =========================
       MENÚ SUPERIOR
    ========================= */
    .topnav {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
    }

    .topnav__center {
      flex:1;
      display:flex;
      justify-content:center;
      gap:8px;
      overflow-x:auto;
      padding: 4px 0;
    }

    /* =========================
       MODAL QR
    ========================= */
    .modal.hidden { display:none; }

    .modal {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .modal-content {
      width:min(420px, 95vw);
      background:#fff;
      border-radius:12px;
      padding:16px;
      text-align:center;
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        align-items:flex-start;
      }
      .topnav {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body>
  <div class="layout">
    <main class="content">

      <!-- HEADER -->
      <div class="topbar">
        <div class="topbar-left">
          <img id="clubLogo" class="logo" alt="Logo club" />
          <div class="topbar-titles">
            <div class="club-name" id="clubTitle">Panel del Club</div>
            <div class="club-user" id="meLabel"></div>
          </div>
        </div>

        <div class="topbar-right">
          <button id="btnVerQR" class="navbtn navbtn--top">📱 Ver QR</button>
          <select id="clubSelect" class="club-select"></select>
          <span class="badge" id="roleBadge">Rol: —</span>
        </div>
      </div>

      <!-- MENÚ -->
      <nav class="topnav">
        <div class="topnav__center">
          <button class="navbtn navbtn--top" data-section="socios">👤 Socios</button>
          <button class="navbtn navbtn--top" data-section="pendientes">🕒 Pendientes</button>
          <button class="navbtn navbtn--top" data-section="pagos">💰 Pagos</button>
          <button class="navbtn navbtn--top" data-section="gastos">🧾 Gastos</button>
          <button class="navbtn navbtn--top" data-section="noticias">📣 Noticias</button>
          <button class="navbtn navbtn--top" data-section="cumples">🎂 Cumpleaños</button>
          <button class="navbtn navbtn--top" data-section="configuracion">⚙️ Configuración</button>
          <button class="navbtn navbtn--top" data-section="reportes">📊 Reportes</button>
        </div>

        <button class="navbtn navbtn--top navbtn--logout" onclick="logout()">Cerrar sesión</button>
      </nav>

      <!-- CONTENIDO -->
      <div class="card" id="sectionContainer"></div>

    </main>
  </div>

  <!-- MODAL QR -->
  <div id="modalQR" class="modal hidden">
    <div class="modal-content">
      <h3>📱 Postulación de Socios</h3>
      <div id="qrContainer" style="margin:16px auto;"></div>
      <input id="qrLink" type="text" readonly style="width:100%; padding:8px;" />
      <div style="margin-top:12px; display:flex; gap:10px; justify-content:center;">
        <button id="btnCopyQR" class="navbtn navbtn--top">📋 Copiar link</button>
        <button id="btnCloseQR" class="navbtn navbtn--top">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('activeClubId');
      window.location.href = '/admin.html';
    }
  </script>

  <script src="/js/club.js"></script>
  <script src="/js/socios.js"></script>
  <script src="/js/configuracion.js"></script>
  <script src="/js/gastos.js"></script>
  <script src="/js/pagos.js"></script>
  <script defer src="/js/cumples.js"></script>
  <script src="/js/reportes.js"></script>
  <script src="/js/noticias.js"></script>
  <script src="/js/pendientes.js"></script>

</body>
</html>
