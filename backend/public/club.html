<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel del Club</title>

<style>
:root {
  --color-primary: #2563eb;
  --color-secondary: #1e40af;
  --color-accent: #facc15;
}

*,
*::before,
*::after { box-sizing: border-box; }

html, body {
  margin: 0;
  background: #f3f4f6;
  font-family: Arial, sans-serif;
}

.layout { display:flex; flex-direction: column; min-height: 100vh; }

.content {
  max-width: 1280px;
  margin: 0 auto;
  padding: 12px 14px 18px;
}

/* ===== HEADER NUEVO ===== */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:14px;
  background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
  color:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.topbar-left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  width:44px;
  height:44px;
  object-fit:contain;
  border-radius:10px;
  background:#fff;
  padding:4px;
}

.club-name { font-size:16px; font-weight:700; }
.club-user { font-size:12px; opacity:.85; }

.topbar-right { display:flex; align-items:center; gap:8px; }

.club-select { padding:4px; border-radius:6px; }

/* ===== BOTONES ===== */
.navbtn {
  padding:8px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: var(--color-primary);
  color:#fff;
}

.navbtn:hover { background: var(--color-secondary); }

.navbtn--logout { background:#ef4444; }
.navbtn--logout:hover { background:#dc2626; }

.badge {
  background: var(--color-accent);
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
}

/* ===== BANNER ===== */
.impersonation-banner {
  display:none;
  margin-bottom:10px;
  padding:8px 10px;
  border-radius:10px;
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#9a3412;
  font-size:13px;
  align-items:center;
  gap:10px;
}

/* ===== NAV ===== */
.topnav {
  display:flex;
  justify-content:space-between;
  margin-top:12px;
}

.topnav__center {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* ===== CARD ===== */
.card {
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-top:14px;
}

/* ===== MODAL ===== */
.modal.hidden { display:none; }

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:#fff;
  border-radius:12px;
  padding:16px;
}
</style>

</head>

<!-- MODAL QR -->
<div id="modalQR" class="modal hidden">
  <div class="modal-content" style="max-width:420px;text-align:center;">
    <h3>📱 Postulación de Socios</h3>
    <div id="qrContainer"></div>
    <input id="qrLink" style="width:100%;margin-top:8px"/>
    <div style="margin-top:10px;">
      <button id="btnCopyQR" class="navbtn">Copiar</button>
      <button id="btnCloseQR" class="navbtn">Cerrar</button>
    </div>
  </div>
</div>

<body>

<div class="layout">
<main class="content">

<!-- BANNER -->
<div id="impersonationBanner" class="impersonation-banner">
  👁️ Modo SOLO LECTURA
  <span id="impersonationClubName"></span>
  <button id="btnExitImpersonation" class="navbtn">Salir</button>
</div>

<!-- HEADER CORRECTO -->
<div class="topbar">

  <div class="topbar-left">
    <img id="clubLogo" class="logo"/>
    <div>
      <div id="clubTitle" class="club-name">Panel del Club</div>
      <div id="meLabel" class="club-user"></div>
    </div>
  </div>

  <div class="topbar-right">
    <button id="btnVerQR" class="navbtn">📱 Ver QR</button>
    <button class="navbtn" data-section="acceso">🚪 Control acceso</button>

    <select id="clubSelect" class="club-select"></select>
    <span class="badge" id="roleBadge">Rol</span>

    <button class="navbtn navbtn--logout" onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- MENÚ -->
<nav class="topnav">
  <div class="topnav__center">
    <button class="navbtn" data-section="socios">Socios</button>
    <button class="navbtn" data-section="pendientes">Pendientes</button>
    <button class="navbtn" data-section="pagos">Ingresos</button>
    <button class="navbtn" data-section="gastos">Gastos</button>
    <button class="navbtn" data-section="noticias">Noticias</button>
    <button class="navbtn" data-section="notificaciones">Notificaciones</button>
    <button class="navbtn" data-section="cumples">Agenda</button>
    <button class="navbtn" data-section="configuracion">Configuración</button>
    <button class="navbtn" data-section="reportes">Reportes</button>
  </div>
</nav>

<div class="card" id="sectionContainer"></div>

</main>
</div>

<!-- SCRIPTS ORIGINALES (NO TOCADOS) -->
<script src="/js/club.js"></script>
<script src="/js/socios.js"></script>
<script src="/js/vendor/zxing-browser.min.js?v=20260331"></script>
<script src="/js/acceso.js?v=20260331"></script>
<script src="/js/configuracion.js"></script>
<script src="/js/gastos.js"></script>
<script src="/js/pagos.js"></script>
<script defer src="/js/cumples.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/reportes.js"></script>
<script src="/js/noticias.js"></script>
<script src="/js/notificaciones.js?v=20260331-1"></script>
<script src="/js/pendientes.js"></script>

</body>
</html>
