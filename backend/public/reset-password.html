<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiar contraseña</title>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --error:#dc2626;
  --ok:#16a34a;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(135deg, rgba(37,99,235,.9), rgba(30,64,175,.9)),
    url("/img/login-bg.jpg") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

/* CARD */
.card{
  width:100%;
  max-width:400px;
  background:white;
  border-radius:18px;
  padding:28px;
  box-shadow:0 25px 50px rgba(0,0,0,.25);
  text-align:center;
}

/* HEADER */
.logo{
  width:90px;
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:20px;
}

p{
  font-size:13px;
  color:var(--muted);
}

/* INPUT */
.field{
  text-align:left;
  margin-top:14px;
}

.input-wrap{
  position:relative;
}

input{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #cbd5f5;
  padding:0 40px 0 12px;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
}

/* PASSWORD BAR */
.bar{
  height:6px;
  border-radius:6px;
  margin-top:8px;
  background:#e5e7eb;
  overflow:hidden;
}

.bar div{
  height:100%;
  width:0%;
  transition:all .3s;
}

.weak{background:#dc2626;width:33%}
.medium{background:#f59e0b;width:66%}
.strong{background:#16a34a;width:100%}

/* RULES */
.rules{
  text-align:left;
  margin-top:10px;
  font-size:12px;
}

.rules span{
  display:block;
  color:#64748b;
}

.rules span.ok{
  color:var(--ok);
  font-weight:600;
}

/* BUTTON */
button{
  margin-top:18px;
  height:44px;
  width:100%;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:white;
  font-weight:700;
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
  animation:fade .4s;
}

.check{
  font-size:50px;
  color:var(--ok);
}

@keyframes fade{
  from{opacity:0; transform:scale(.9)}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- FORM -->
  <div id="form">

    <img src="/img/logo-tsmc.png" class="logo">

    <h1>Nueva contraseña</h1>
    <p>Ingresá tu nueva clave</p>

    <div class="field">
      <div class="input-wrap">
        <input id="p1" type="password" placeholder="Nueva contraseña">
        <span class="eye" onclick="toggle('p1')">👁</span>
      </div>

      <!-- barra -->
      <div class="bar"><div id="strength"></div></div>

      <!-- reglas -->
      <div class="rules">
        <span id="r1">• Más de 8 caracteres</span>
        <span id="r2">• Una mayúscula</span>
        <span id="r3">• Carácter especial (! @ # $ % & * )</span>
      </div>
    </div>

    <div class="field">
      <div class="input-wrap">
        <input id="p2" type="password" placeholder="Confirmar contraseña">
        <span class="eye" onclick="toggle('p2')">👁</span>
      </div>
    </div>

    <button onclick="save()">Actualizar contraseña</button>

  </div>

  <!-- SUCCESS -->
  <div class="success" id="success">
    <div class="check">✅</div>
    <h2>Contraseña actualizada</h2>
    <p>Redirigiendo al login…</p>
  </div>

</div>

<script>
const p1=document.getElementById('p1');
const bar=document.getElementById('strength');

function token(){
  return new URLSearchParams(location.search).get('token');
}

// Mostrar / ocultar password
function toggle(id){
  const input=document.getElementById(id);
  input.type = input.type==='password' ? 'text' : 'password';
}

// VALIDACIÓN EN VIVO
p1.addEventListener('input', ()=>{

  const val=p1.value;

  const r1=val.length>=9;
  const r2=/[A-Z]/.test(val);
  const r3=/[^A-Za-z0-9]/.test(val);

  updateRule('r1',r1);
  updateRule('r2',r2);
  updateRule('r3',r3);

  const score=[r1,r2,r3].filter(v=>v).length;

  bar.className='';
  if(score===1) bar.classList.add('weak');
  if(score===2) bar.classList.add('medium');
  if(score===3) bar.classList.add('strong');
});

function updateRule(id,ok){
  const el=document.getElementById(id);
  el.classList.toggle('ok',ok);
}

// GUARDAR
async function save(){

  const password=p1.value;
  const confirm=document.getElementById('p2').value;

  const r1=password.length>=9;
  const r2=/[A-Z]/.test(password);
  const r3=/[^A-Za-z0-9]/.test(password);

  if(!r1||!r2||!r3){
    alert(`La contraseña debe cumplir:
• Más de 8 caracteres
• Una mayúscula
• Un carácter especial (! @ # $ % & * )`);
    return;
  }

  if(password!==confirm){
    alert('Las contraseñas no coinciden');
    return;
  }

  try{
    const res=await fetch('/auth/password-reset/confirm',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:token(),password})
    });

    const data=await res.json();

    if(!res.ok||!data.ok){
      throw new Error(data.error);
    }

    // Animación éxito
    document.getElementById('form').style.display='none';
    document.getElementById('success').style.display='block';

    setTimeout(()=>{
      window.location.href='/admin.html';
    },2000);

  }catch(e){
    alert(e.message || 'Error');
  }
}
</script>

</body>
</html>
