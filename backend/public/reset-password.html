<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambiar contraseña</title>

<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1e40af;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --error:#dc2626;
  --ok:#166534;
}

*{
  box-sizing:border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
}

body{
  margin:0;
  min-height:100vh;
  background:
    linear-gradient(135deg, rgba(37,99,235,.9), rgba(30,64,175,.9)),
    url("/img/login-bg.jpg") center / cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
}

/* ========================= */
/* CARD */
/* ========================= */

.card{
  width:100%;
  max-width:380px;
  background:var(--card);
  border-radius:18px;
  padding:28px;
  box-shadow:0 25px 50px rgba(0,0,0,.25);
}

/* ========================= */
/* HEADER */
/* ========================= */

.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:90px;
  height:90px;
  object-fit:contain;
  border-radius:16px;
  margin-bottom:10px;
}

h1{
  margin:0;
  font-size:20px;
  color:var(--text);
}

p{
  margin:6px 0 0;
  font-size:13px;
  color:var(--muted);
}

/* ========================= */
/* FORM */
/* ========================= */

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:14px;
}

label{
  font-size:12px;
  font-weight:600;
  color:var(--text);
}

input{
  height:42px;
  padding:0 12px;
  border-radius:10px;
  border:1px solid #cbd5f5;
  font-size:14px;
  outline:none;
}

input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

/* ========================= */
/* BOTON */
/* ========================= */

button{
  margin-top:22px;
  height:44px;
  width:100%;
  border-radius:12px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:var(--primary-dark);
}

/* ========================= */
/* MENSAJES */
/* ========================= */

.msg{
  margin-top:14px;
  font-size:13px;
  text-align:center;
  display:none;
}

.msg.ok{
  color:var(--ok);
  display:block;
}

.msg.err{
  color:var(--error);
  display:block;
}

.hint{
  margin-top:10px;
  font-size:12px;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <div class="header">
    <img src="/img/logo-tsmc.png" class="logo">
    <h1>Nueva contraseña</h1>
    <p>Ingresá tu nueva clave de acceso</p>
  </div>

  <div class="field">
    <label>Nueva contraseña</label>
    <input id="p1" type="password">
  </div>

  <div class="field">
    <label>Confirmar contraseña</label>
    <input id="p2" type="password">
  </div>

  <div class="hint">
    Debe tener más de 8 caracteres, una mayúscula y un carácter especial
  </div>

  <button onclick="save()">Actualizar contraseña</button>

  <div id="msg" class="msg"></div>

</div>

<script>
const regex=/^(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{9,}$/;

function token(){
  return new URLSearchParams(location.search).get('token');
}

function showMsg(text, ok=false){
  const el=document.getElementById('msg');
  el.className='msg '+(ok?'ok':'err');
  el.textContent=text;
}

async function save(){
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;

  if(!regex.test(p1)){
    return showMsg('La contraseña no cumple los requisitos');
  }

  if(p1!==p2){
    return showMsg('Las contraseñas no coinciden');
  }

  try{
    const res = await fetch('/auth/password-reset/confirm',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:token(),password:p1})
    });

    const data = await res.json();

    if(!res.ok || !data.ok){
      throw new Error(data.error || 'Error');
    }

    showMsg('✅ Contraseña actualizada correctamente',true);

    setTimeout(()=>{
      window.location.href='/admin.html';
    },2000);

  }catch(e){
    showMsg(e.message || 'Error actualizando contraseña');
  }
}
</script>

</body>
</html>
