<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cambiar contraseña</title>
</head>

<body>

<h2>Nueva contraseña</h2>

<input id="p1" type="password" placeholder="Nueva contraseña"/>
<input id="p2" type="password" placeholder="Confirmar"/>

<button onclick="save()">Guardar</button>

<script>
const regex=/^(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{9,}$/;

function token(){
  return new URLSearchParams(location.search).get('token');
}

async function save(){
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;

  if(!regex.test(p1)){
    alert('Password inválido');
    return;
  }

  if(p1!==p2){
    alert('No coinciden');
    return;
  }

  await fetch('/auth/password-reset/confirm',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({token:token(),password:p1})
  });

  alert('OK, ya podés loguearte');
}
</script>

</body>
</html>
