<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso al Sistema</title>

  <style>
    :root{
      --primary:#2563eb;
      --primary-dark:#1e40af;
      --bg:#f1f5f9;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --error:#dc2626;
    }

    *{
      box-sizing:border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial;
    }

    body{
      margin:0;
      min-height:100vh;
      background:
        linear-gradient(135deg, rgba(37,99,235,.9), rgba(30,64,175,.9)),
        url("/img/login-bg.jpg") center / cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .login-card{
      width:100%;
      max-width:380px;
      background:var(--card);
      border-radius:18px;
      padding:28px 26px 26px;
      box-shadow:0 25px 50px rgba(0,0,0,.25);
      animation:fadeIn .4s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(10px);}
      to{opacity:1; transform:none;}
    }

    .login-header{
      text-align:center;
      margin-bottom:20px;
    }

    .login-header h1{
      margin:0;
      font-size:22px;
      color:var(--text);
    }

    .login-header p{
      margin:6px 0 0;
      font-size:14px;
      color:var(--muted);
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:14px;
    }

    .field label{
      font-size:13px;
      font-weight:600;
      color:var(--text);
    }

    .field input{
      height:42px;
      padding:0 12px;
      border-radius:10px;
      border:1px solid #cbd5f5;
      font-size:14px;
      outline:none;
      transition:.15s;
    }

    .field input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(37,99,235,.2);
    }

    .login-btn{
      margin-top:22px;
      height:44px;
      width:100%;
      border-radius:12px;
      border:none;
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.15s;
    }

    .login-btn:hover{
      background:var(--primary-dark);
    }

    .login-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .error{
      margin-top:14px;
      color:var(--error);
      font-size:13px;
      text-align:center;
      display:none;
    }

    .footer{
      margin-top:22px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
    }

    @media(max-width:480px){
      .login-card{
        padding:22px 18px;
        border-radius:14px;
      }
    }

/* =========================
   LOGIN – LOGO
========================= */
.login-title{
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-logo{
  width:68px;
  height:68px;
  object-fit:contain;
  border-radius:14px;
}
  </style>
</head>

<body>

  <div class="login-card">

    <div class="login-header">
  <div class="login-title">
  <img src="/img/logo-tsmc.png" alt="Todo Sobre mi Club" class="login-logo" />
</div>

  <p>Ingresá con tu usuario y contraseña</p>
</div>


    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="usuario@correo.com" autofocus />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      Ingresar
    </button>

    <div class="error" id="loginError">
      Usuario o contraseña incorrectos
    </div>

    <div class="footer">
      © Todo Sobre mi Club
    </div>

  </div>

  <script src="/js/auth.js"></script>

  <script>
    async function doLogin(){
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      err.style.display = 'none';

      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      try{
        // reutilizamos la función existente
        await login();
      }catch(e){
        err.style.display = 'block';
      }finally{
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

    // Enter para enviar
    document.addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        doLogin();
      }
    });
  </script>

</body>
</html>
